# docker-compose.kafka.yml
# Khoi dong Kafka + ZooKeeper cho FinSent-Agent
# Chay: docker compose -f docker-compose.kafka.yml up -d
#
# NOTE: File nay CHI quan ly Kafka infra.
# Code Python chay truc tiep tren host (khong container hoa).

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finsent-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk_data:/var/lib/zookeeper/data
      - zk_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsent-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT = truy cap tu host (localhost:9092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 72
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms1G"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finsent-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command: >
      bash -c "
        echo 'Tao Kafka topics...' &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic fb_mock_data        --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic market_stock_data   --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic realtime_news       --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic realtime_social     --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic realtime_market     --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic realtime_policy     --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic news_rss_data       --partitions 1 --replication-factor 1 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092
          --topic f319_data           --partitions 1 --replication-factor 1 &&
        echo 'Tat ca 8 topics da duoc tao thanh cong.' &&
        kafka-topics --bootstrap-server kafka:9092 --list
      "

volumes:
  zk_data:
  zk_logs:
  kafka_data:
